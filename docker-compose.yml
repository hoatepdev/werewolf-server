version: '3.8'

# Base compose: app only (no SSL). Use docker-compose.prod.yml for full production stack.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: werewolf-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=4000
    ports:
      - '4002:4000'
    networks:
      - werewolf-net

networks:
  werewolf-net:
    driver: bridge
