# Base compose: app only (no SSL). Use docker-compose.prod.yml for full production stack.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: werewolf-app
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - '4002:4001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4001/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
