version: '3.8'

# Production overlay: adds nginx with SSL termination.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires: /etc/letsencrypt/live/masoi.hoatepdev.site/ certs on the host.
services:
  nginx:
    container_name: masoi-nginx
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/masoi.hoatepdev.site/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/masoi.hoatepdev.site/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - app
    networks:
      - masoi-net

  app:
    ports:
      - '4001' # expose to Docker network only; nginx proxies externally
